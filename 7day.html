<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>7 天開播挑戰｜LUXCAT 未來商學院</title>
<style>
  :root{--bg:#07090f;--card:#10131d;--line:rgba(255,255,255,.12);--text:#f5f7fb;--muted:#8e97a9;--cyan:#6bf5e5;--lime:#c8ff69}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{font-family:Inter,"Noto Sans TC","Microsoft JhengHei",system-ui,sans-serif;color:var(--text);background:radial-gradient(circle at 15% -5%,rgba(107,245,229,.15),transparent 40%),radial-gradient(circle at 90% 8%,rgba(200,255,105,.1),transparent 38%),var(--bg);line-height:1.6;min-height:100vh}
  .wrap{width:min(480px,100%);margin:auto;padding:28px 18px 70px}
  .eyebrow{display:inline-block;padding:5px 11px;border:1px solid var(--line);border-radius:999px;color:var(--cyan);font-size:10px;font-weight:900;letter-spacing:.15em}
  h1{margin:15px 0 6px;font-size:30px;line-height:1.22;letter-spacing:-.02em}
  h1 span{color:transparent;background:linear-gradient(100deg,var(--cyan),var(--lime));-webkit-background-clip:text;background-clip:text}
  .sub{color:var(--muted);font-size:13px;margin-bottom:20px}
  .progress-card{background:linear-gradient(160deg,#141925,#0c0f17);border:1px solid var(--line);border-radius:20px;padding:18px 18px 16px;margin-bottom:16px}
  .pc-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:11px}
  .pc-top b{font-size:15px}.pc-top span{color:var(--lime);font-weight:900;font-size:14px}
  .bar{height:10px;border-radius:999px;background:#20242f;overflow:hidden}
  .bar i{display:block;height:100%;width:0;border-radius:999px;background:linear-gradient(90deg,var(--cyan),var(--lime));transition:.35s}
  .pc-msg{margin-top:10px;font-size:12px;color:var(--muted)}
  .day{border:1px solid var(--line);border-radius:18px;background:var(--card);padding:15px 16px;margin-bottom:11px;transition:.2s}
  .day.done{border-color:rgba(200,255,105,.4);background:linear-gradient(160deg,rgba(200,255,105,.06),var(--card))}
  .day-head{display:grid;grid-template-columns:auto 1fr auto;gap:12px;align-items:center;cursor:pointer}
  .daynum{width:44px;height:44px;flex-shrink:0;display:grid;place-items:center;border-radius:13px;background:rgba(107,245,229,.1);border:1px solid rgba(107,245,229,.3);color:var(--cyan);font-weight:900;font-size:11px;line-height:1.1;text-align:center}
  .day.done .daynum{background:var(--lime);border-color:var(--lime);color:#07100e}
  .day-title{font-family:inherit}
  .day-title b{font-size:15px;display:block}
  .day-title small{color:var(--muted);font-size:11.5px}
  .check{width:28px;height:28px;border-radius:50%;border:2px solid var(--line);display:grid;place-items:center;color:transparent;font-size:14px;font-weight:900;flex-shrink:0}
  .day.done .check{background:var(--lime);border-color:var(--lime);color:#07100e}
  .day-body{margin-top:12px;padding-top:12px;border-top:1px dashed var(--line)}
  .day-body ul{list-style:none;display:grid;gap:7px}
  .day-body li{display:grid;grid-template-columns:16px 1fr;gap:8px;font-size:12.5px}
  .day-body li i{color:var(--cyan);font-style:normal}
  .tip{margin-top:9px;padding:8px 11px;border-left:3px solid var(--lime);border-radius:9px;background:rgba(200,255,105,.07);font-size:11.5px;color:#c9d0bd}
  .done-banner{display:none;margin-top:16px;padding:22px 18px;text-align:center;border:1px solid rgba(200,255,105,.4);border-radius:20px;background:linear-gradient(160deg,rgba(200,255,105,.1),#0c0f17)}
  .done-banner.show{display:block}
  .done-banner h2{font-size:22px}.done-banner p{color:var(--muted);font-size:12.5px;margin-top:6px}
  .cta{display:flex;align-items:center;justify-content:center;gap:8px;height:50px;margin-top:14px;border-radius:14px;background:#06c755;color:#fff;text-decoration:none;font-weight:900;font-size:13px}
  .reset{display:block;margin:18px auto 0;background:none;border:0;color:#5f6775;font-size:11px;text-decoration:underline;cursor:pointer}
</style>
</head>
<body>
<main class="wrap">
  <span class="eyebrow">LUXCAT 未來商學院・7 天挑戰</span>
  <h1>7 天，逼自己<br><span>發出第一支</span></h1>
  <p class="sub">別再想「等我準備好」——沒有準備好那天。跟著做，7 天後你會有第一支作品。點卡片展開任務，做完打勾。</p>

  <div class="progress-card">
    <div class="pc-top"><b>我的進度</b><span id="pct">0 / 7 天</span></div>
    <div class="bar"><i id="barfill"></i></div>
    <div class="pc-msg" id="pcmsg">先從 Day 1 開始，一天一小步就好 🌱</div>
  </div>

  <div id="list"></div>

  <div class="done-banner" id="doneBanner">
    <h2>🎉 你發出第一支了！</h2>
    <p>這是最難的一步——「開始」。多數人卡在這輩子都沒發，你做到了。接下來就是重複＋變好。</p>
    <a class="cta" href="https://s.luckycat.no8.io/link/channels/0KghAqovcW" target="_blank" rel="noopener">💬 想要下一步的完整計畫？加 LINE 找老師</a>
  </div>

  <button class="reset" id="reset">重置挑戰</button>
</main>

<script>
const DAYS=[
 {t:'定位｜你要當「誰」',s:'決定拍給誰看、拍什麼',li:['用一句話寫：我要拍給＿＿的人，主題是＿＿','先選「一個」你最想做的賽道，別貪心'],tip:'定位不用完美，先開始永遠比想清楚重要。'},
 {t:'偷師｜拆 5 支爆款',s:'看懂別人為什麼會紅',li:['找同類 5 支高播放影片','記下：前 3 秒怎麼開場、結構、字幕怎麼下'],tip:'你不是抄，是拆解「為什麼會紅」。'},
 {t:'選題｜列 10 個題目',s:'一次囤好一週的題',li:['用「你還在／你以為／為什麼」公式列 10 題','圈出今天最想拍的那 1 個'],tip:'題庫夠多，才不會每天卡「今天拍什麼」。'},
 {t:'腳本｜寫第一支',s:'30 秒結構寫出來',li:['挑 1 題寫：前 3 秒鉤子 → 中間一個重點 → 結尾 CTA'],tip:'30 秒只講一件事，別塞太多。'},
 {t:'開拍｜拍出來就贏一半',s:'手機拍就好',li:['找順光，手機直拍','同一句多拍 2–3 條，選最好的'],tip:'第一支本來就會醜，拍了才有下一支。'},
 {t:'剪輯｜剪＋上字幕',s:'用剪映收尾',li:['剪掉廢話、留最精華','用「識別字幕」上字幕、配個音樂'],tip:'字幕一定要上——很多人是靜音在看。'},
 {t:'發布｜按下去 🚀',s:'今天就發出去',li:['寫標題 ＋ 3 個 hashtag','發布！','規劃下週要發哪 3 支'],tip:'發布不是結束，是開始——發了才有數據可以學。'},
];
const KEY='luxcat7day';
const $=s=>document.querySelector(s);
function load(){try{return JSON.parse(localStorage.getItem(KEY)||'{}')}catch(e){return{}}}
function save(o){localStorage.setItem(KEY,JSON.stringify(o))}
let open=-1;

function render(){
  const st=load();
  const doneN=DAYS.filter((_,i)=>st['d'+i]).length;
  $('#pct').textContent=doneN+' / 7 天';
  $('#barfill').style.width=(doneN/7*100)+'%';
  $('#pcmsg').textContent = doneN===0?'先從 Day 1 開始，一天一小步就好 🌱'
    : doneN<7?`已完成 ${doneN} 天，繼續！你正在做多數人不敢做的事 💪`
    : '七天全部完成 🎉 你已經是「有作品的人」了！';
  $('#list').innerHTML=DAYS.map((d,i)=>{
    const done=!!st['d'+i];
    return `<div class="day ${done?'done':''}" data-i="${i}">
      <div class="day-head" data-head="${i}">
        <div class="daynum">DAY<br>${i+1}</div>
        <div class="day-title"><b>${d.t}</b><small>${d.s}</small></div>
        <div class="check" data-check="${i}">✓</div>
      </div>
      ${open===i?`<div class="day-body"><ul>${d.li.map(x=>`<li><i>▸</i><span>${x}</span></li>`).join('')}</ul><div class="tip">🍄 ${d.tip}</div></div>`:''}
    </div>`;
  }).join('');
  $('#doneBanner').classList.toggle('show',doneN===7);
}
document.addEventListener('click',e=>{
  const c=e.target.closest('[data-check]');
  if(c){const i=+c.dataset.check;const st=load();st['d'+i]=!st['d'+i];save(st);render();e.stopPropagation();return}
  const h=e.target.closest('[data-head]');
  if(h){const i=+h.dataset.head;open=open===i?-1:i;render();}
});
$('#reset').addEventListener('click',()=>{if(confirm('確定重置全部進度？')){localStorage.removeItem(KEY);open=-1;render();}});
render();
</script>
</body>
</html>
